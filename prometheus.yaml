global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s

rule_files:
  - "alerts.yml"

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

scrape_configs:
# ! external VM Monitorring
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']
        labels:
          nodename: "Main-Centralized-Server"
  
  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']

  # Centralized monitoring: discovers remote node-exporter instances from JSON files
  # Add target files to prometheus/targets/ — Prometheus auto-discovers changes every 30s
  - job_name: 'remote-node-exporters'
    file_sd_configs:
      - files:
          - '/etc/prometheus/targets/*.json'
        refresh_interval: 30s
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
      - source_labels: [vm_name]
        target_label: vm_name
        regex: '(.+)'
        action: replace
      - source_labels: [environment]
        target_label: environment
        regex: '(.+)'
        action: replace
      - source_labels: [app]
        target_label: app
        regex: '(.+)'
        action: replace

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # - job_name: 'cadvisor'
  #   static_configs:
  #     - targets: ['cadvisor:8080']

  # blackbox exporter — probe HTTP/HTTPS endpoints for availability
  # Replace these targets with your own URLs. Each target uses a probe module
  # defined in blackbox_exporter/blackbox_exporter.yaml (http_website_2xx, http_api_2xx).
  - job_name: 'blackbox'
    metrics_path: /probe
    static_configs:
      - targets:
        # - https://your-website.com       # Website availability check
        # - https://api.yourapp.com/health  # API health endpoint
        labels:
          probe_module: http_website_2xx

      # - targets:
      #   - https://api.yourapp.com/health  # API endpoint with stricter checks
      #   labels:
      #     probe_module: http_api_2xx

    relabel_configs:
      # 1. Read the custom 'probe_module' label and set it as the module parameter.
      - source_labels: [probe_module]
        target_label: __param_module

      # 2. Copy the target's address to the '__param_target' parameter.
      - source_labels: [__address__]
        target_label: __param_target
      
      # 3. Set the 'instance' label for Grafana/alerts to be the target's address.
      - source_labels: [__param_target]
        target_label: instance
      
      # 4. Change the scrape address to be the blackbox exporter itself.
      - target_label: __address__
        replacement: blackbox_exporter:9115  # The blackbox exporter's real address.
  - job_name: 'blackbox_exporter'  # collect blackbox exporter's operational metrics.
    static_configs:
      - targets: ['blackbox_exporter:9115']

  # Uncomment the following section if you need to using postgres exporter
  # - job_name: postgres
  #   static_configs:
  #     - targets: ["postgres_exporter:9187"]

  # uncomment the following section if you need to using nginx exporter
  # - job_name: 'nginx'
  #   static_configs:
  #     - targets: ['nginx_exporter:9113']